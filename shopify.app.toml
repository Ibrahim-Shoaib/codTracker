# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4e49263445787763216232655d181ef2"
name = "cod-tracker"
application_url = "https://codtracker-production.up.railway.app"
embedded = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks/uninstall"

  # Ad Tracking — feeds CAPI relay. Order webhooks are the canonical source
  # of truth for Purchase events; refunds fire negative-value Purchase.
  # Checkouts give us InitiateCheckout; cart attributes carry _fbp/_fbc/_fbclid
  # from the storefront into the order payload via note_attributes.
  [[webhooks.subscriptions]]
  topics = [
    "orders/paid",
    "orders/edited",
    "refunds/create",
    "checkouts/create",
    "checkouts/update",
  ]
  uri = "/api/webhooks/meta-pixel"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Required scopes (existing): read_orders, read_products, read_inventory
# New scopes for Ad Tracking:
#   - read_customers       → email/phone/name on order webhooks for hashed identity
#   - read_checkouts       → checkout webhooks for InitiateCheckout
#   - write_pixels, read_pixels → install/manage Custom Web Pixel via Admin GraphQL
#   - read_customer_events → REQUIRED by webPixelCreate; lets the Web Pixel
#                            receive checkout/purchase events from Shopify's
#                            customer events stream inside the LavaMoat sandbox.
#   - read_themes          → poll the active theme's settings_data.json so the
#                            UI can auto-detect when the merchant has saved
#                            our app embeds. Read-only; no `write_themes` is
#                            requested because Shopify gates programmatic
#                            theme writes behind an exemption tracking apps
#                            don't qualify for (see docs on theme app extensions).
scopes = "read_orders,read_products,read_inventory,read_customers,read_checkouts,write_pixels,read_pixels,read_customer_events,read_themes"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://codtracker-production.up.railway.app/auth/callback" ]

# App Proxy — serves first-party tracking endpoint at the merchant's domain:
#   https://{shop}.myshopify.com/apps/tracking/track  →  /proxy/tracking/track
# This bypasses ad blockers (requests look first-party) and lets cookies set
# by our pixel live in the merchant's domain context (full 90-day fbp/fbc lifespan).
[app_proxy]
url = "https://codtracker-production.up.railway.app/proxy/tracking"
subpath = "tracking"
prefix = "apps"
